<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Guild - Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="game-container">
        <!-- Left Panel: Navigation Menu -->
        <div class="panel left-panel" id="left-panel">
            <!-- Navigation buttons rendered by ui.js -->
        </div>

        <!-- Middle Panel: Contextual Content -->
        <div class="panel middle-panel" id="middle-panel">
            <!-- Contextual lists rendered by ui.js -->
        </div>

        <!-- Right Panel: Details and Actions -->
        <div class="panel right-panel" id="right-panel">
            <!-- Ship Log, Details, and Actions rendered by ui.js -->
        </div>
    </div>

    <!-- Include JavaScript files -->
    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ui.js"></script>
</body>

</html>
