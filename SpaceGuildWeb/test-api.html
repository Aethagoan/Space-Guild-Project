<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Guild - API Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #121212;
            color: #e8e8e8;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: rgb(0, 95, 0); }
        .test-section {
            background: #1a1a1a;
            border: 2px solid rgb(66, 66, 66);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        button {
            background: rgb(0, 95, 0);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            margin: 0.5rem 0.5rem 0.5rem 0;
        }
        button:hover { background: rgb(0, 120, 0); }
        .result {
            background: #252525;
            border-left: 3px solid rgb(0, 95, 0);
            padding: 1rem;
            margin-top: 1rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .error { border-left-color: rgb(182, 0, 0); color: #ff6b6b; }
        .success { border-left-color: rgb(0, 95, 0); color: #6bff6b; }
        .status { font-weight: bold; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <h1>Space Guild - Backend API Test</h1>
    <p>Use these tests to verify your backend is running correctly.</p>

    <div class="test-section">
        <h2>1. Health Check</h2>
        <button onclick="testHealth()">Test /health</button>
        <div id="health-result"></div>
    </div>

    <div class="test-section">
        <h2>2. Spawn New Player</h2>
        <button onclick="testSpawnPlayer()">Test /spawn_player (NEW!)</button>
        <div id="spawn-result"></div>
        <p style="font-size: 0.9rem; color: #b0b0b0; margin-top: 0.5rem;">
            Creates a new player with a ship. Returns player_id to use in other tests.
        </p>
    </div>

    <div class="test-section">
        <h2>3. Get Ship Data</h2>
        <input type="number" id="player-id-ship" placeholder="Player ID" style="padding: 0.5rem; margin-right: 0.5rem; background: #252525; border: 1px solid #666; color: #e8e8e8; font-family: 'Courier New', monospace;">
        <button onclick="testGetShip()">Test /ship</button>
        <div id="ship-result"></div>
    </div>

    <div class="test-section">
        <h2>4. Get Location Data</h2>
        <input type="number" id="player-id-location" placeholder="Player ID" style="padding: 0.5rem; margin-right: 0.5rem; background: #252525; border: 1px solid #666; color: #e8e8e8; font-family: 'Courier New', monospace;">
        <button onclick="testGetLocation()">Test /location</button>
        <div id="location-result"></div>
    </div>

    <div class="test-section">
        <h2>5. Queue Action (Scan)</h2>
        <input type="number" id="player-id-action" placeholder="Player ID" style="padding: 0.5rem; margin-right: 0.5rem; background: #252525; border: 1px solid #666; color: #e8e8e8; font-family: 'Courier New', monospace;">
        <button onclick="testQueueAction()">Test /action</button>
        <div id="action-result"></div>
    </div>

    <div class="test-section">
        <h2>6. Run All Tests</h2>
        <button onclick="runAllTests()">Run All Tests</button>
    </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let lastCreatedPlayerId = null;

        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            const className = isError ? 'result error' : 'result success';
            const status = isError ? '❌ ERROR' : '✅ SUCCESS';
            element.innerHTML = `
                <div class="${className}">
                    <div class="status">${status}</div>
                    ${JSON.stringify(data, null, 2)}
                </div>
            `;
            
            // Auto-fill player ID inputs if this was spawn_player
            if (!isError && data.player_id) {
                lastCreatedPlayerId = data.player_id;
                document.getElementById('player-id-ship').value = data.player_id;
                document.getElementById('player-id-location').value = data.player_id;
                document.getElementById('player-id-action').value = data.player_id;
            }
        }

        async function testHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                showResult('health-result', data);
            } catch (error) {
                showResult('health-result', { error: error.message }, true);
            }
        }

        async function testSpawnPlayer() {
            try {
                const response = await fetch(`${API_BASE}/spawn_player`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: 'Test Pilot' })
                });
                const data = await response.json();
                showResult('spawn-result', data);
            } catch (error) {
                showResult('spawn-result', { error: error.message }, true);
            }
        }

        async function testGetShip() {
            try {
                const playerId = document.getElementById('player-id-ship').value || lastCreatedPlayerId;
                if (!playerId) {
                    showResult('ship-result', { error: 'Please enter a player ID or spawn a player first' }, true);
                    return;
                }
                const response = await fetch(`${API_BASE}/ship?player_id=${playerId}`);
                const data = await response.json();
                showResult('ship-result', data);
            } catch (error) {
                showResult('ship-result', { error: error.message }, true);
            }
        }

        async function testGetLocation() {
            try {
                const playerId = document.getElementById('player-id-location').value || lastCreatedPlayerId;
                if (!playerId) {
                    showResult('location-result', { error: 'Please enter a player ID or spawn a player first' }, true);
                    return;
                }
                const response = await fetch(`${API_BASE}/location?player_id=${playerId}`);
                const data = await response.json();
                showResult('location-result', data);
            } catch (error) {
                showResult('location-result', { error: error.message }, true);
            }
        }

        async function testQueueAction() {
            try {
                const playerId = document.getElementById('player-id-action').value || lastCreatedPlayerId;
                if (!playerId) {
                    showResult('action-result', { error: 'Please enter a player ID or spawn a player first' }, true);
                    return;
                }
                
                // First get location to find a target
                const locResponse = await fetch(`${API_BASE}/location?player_id=${playerId}`);
                const locData = await locResponse.json();
                
                // Try to scan the location
                const response = await fetch(`${API_BASE}/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        player_id: playerId,
                        action_type: 'scan',
                        target: locData.name,
                        target_data: 'location'
                    })
                });
                const data = await response.json();
                showResult('action-result', data);
            } catch (error) {
                showResult('action-result', { error: error.message }, true);
            }
        }

        async function runAllTests() {
            await testHealth();
            await new Promise(r => setTimeout(r, 500));
            await testSpawnPlayer();
            await new Promise(r => setTimeout(r, 500));
            await testGetShip();
            await new Promise(r => setTimeout(r, 500));
            await testGetLocation();
            await new Promise(r => setTimeout(r, 500));
            await testQueueAction();
        }

        // Auto-run health check on load
        window.addEventListener('DOMContentLoaded', testHealth);
    </script>
</body>
</html>
